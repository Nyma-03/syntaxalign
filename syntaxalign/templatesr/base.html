<!DOCTYPE html>
<html>
<head>
    <title>Studio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
        }

        /* NAVBAR */
        nav {
            background: linear-gradient(90deg, #1e1b4b, #312e81);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left a,
        .nav-right a {
            color: white;
            text-decoration: none;
            padding: 18px 15px;
            display: inline-block;
            font-weight: 500;
        }

        .nav-left a:hover,
        .nav-right a:hover {
            background-color: #4338ca;
            border-radius: 6px;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        /* DROPDOWN */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #1e1b4b;
            min-width: 180px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            z-index: 1;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #4338ca;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* CONTENT AREA */
        .container {
            padding: 60px 80px;
            color: #1e1b4b;
        }

        h1, h2, h3 {
            color: #1e1b4b;
        }

        hr {
            margin: 0;
            border: none;
            height: 2px;
            background-color: #312e81;
        }
    </style>
</head>

<body>

<nav>
    <div class="nav-left">
        <a href="/">Home</a>

        {% comment %} <div class="dropdown">
            <a href="/services/">Services</a>
            <div class="dropdown-content">
                <a href="/services/?type=design">Design</a>
                <a href="/services/?type=development">Development</a>
            </div>
        </div> {% endcomment %}
        <div class="dropdown">
    <a href="#">Services</a>
    <div class="dropdown-content">
        <a href="/design/">Design</a>
        <a href="/development/">Development</a>
    </div>
</div>


        <a href="/work/">Portfolio</a>
        <a href="/process/">Buy Now</a>
        <a href="/contact/">Contact</a>
    </div>

    <div class="nav-right">
        {% if user.is_authenticated %}
            <a href="/dashboard/">Dashboard</a>
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/signup/">Sign Up</a>
            <a href="/login/">Login</a>
        {% endif %}
    </div>
</nav>

<hr>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
